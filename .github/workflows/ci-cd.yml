name: CI-CD Hugging Face

on:
  push:
    branches:
      - dev

jobs:
  ci:
    name: CI - Build & Smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🐳 Build Docker image
      - name: Build Docker image
        run: docker build -f Dockerfile -t hf-test .

      # 🚀 Run container (HF mode)
      - name: Run container
        run: |
          docker run -d -p 8000:7860 --name api \
            -e ENVIRONMENT=hf \
            hf-test

  cd:
    name: Deploy to Hugging Face
    runs-on: ubuntu-latest
    needs: ci

    steps:
      # 1. Checkout repo GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Clone Hugging Face Space
      - name: Clone HF Space
        run: |
          git clone https://oauth2:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/VikenAI/ml-api hf-space

      # 3. Sync files into Space repo
      - name: Sync project
        run: |
          rsync -av --exclude='.git' ./ hf-space/

      # 4. Commit & push to Hugging Face
      - name: Push to HF Space
        run: |
          cd hf-space
          git config user.email "github-actions@users.noreply.github.com"
          git config user.name "github-actions"

          git add .
          git commit -m "Deploy via GitHub Actions" || echo "No changes"
          git push
