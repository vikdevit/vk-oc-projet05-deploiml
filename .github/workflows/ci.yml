name: CI

on:
  push:
    branches:
      - dev
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Test123!
          POSTGRES_DB: viken_projet5_ml_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Test123!
      POSTGRES_DB: viken_projet5_ml_db
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      JWT_SECRET: dev_super_secret_key_super_long_secret_key_32_chars_minimum_12345

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t ml-api .

      - name: Run API container
        run: |
          docker run -d -p 8000:8000 --name api \
            -e POSTGRES_USER=$POSTGRES_USER \
            -e POSTGRES_PASSWORD=$POSTGRES_PASSWORD \
            -e POSTGRES_DB=$POSTGRES_DB \
            -e POSTGRES_HOST=$POSTGRES_HOST \
            -e POSTGRES_PORT=$POSTGRES_PORT \
            -e JWT_SECRET=$JWT_SECRET \
            ml-api

      - name: Wait API startup
        run: |
          for i in {1..20}; do
            curl -s http://localhost:8000/health && break
            echo "waiting API..."
            sleep 3
          done

      # ✅ IMPORTANT : création des tables dans CI
      - name: Init DB (create tables + schema)
        run: |
          sleep 5
          docker exec api python scripts/db/create_tables.py

      # (optionnel si ton script insert_employees est requis)
      - name: Insert employees dataset (optional)
        run: |
          docker exec api python scripts/db/insert_employees.py || true

      # ✅ test API avec ton payload complet
      - name: Run API test (predict)
        run: |
          curl -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{
              "employees": [
                {
                  "id": 1471,
                  "age": 34,
                  "genre": "m",
                  "revenu_mensuel": 3200,
                  "statut_marital": "celibataire",
                  "departement": "commercial",
                  "poste": "manager",
                  "nombre_experiences_precedentes": 3,
                  "nombre_total_annees_experience": 5,
                  "nombre_total_annees_dans_l_entreprise": 4,
                  "nombre_total_annees_dans_le_poste_actuel": 2,
                  "satisfaction_salarie_environnement": 3,
                  "satisfaction_salarie_nature_travail": 4,
                  "satisfaction_salarie_equipe": 3,
                  "satisfaction_salarie_equilibre_pro_perso": 3,
                  "note_evaluation_precedente": 4,
                  "niveau_hierarchique_poste": 2,
                  "note_evaluation_actuelle": 4,
                  "heures_supplementaires": "oui",
                  "precedent_pourcentage_d_augmentation": 12,
                  "nombre_participation_pee": 2,
                  "nombre_de_formations_suivies": 3,
                  "distance_domicile_travail": 10,
                  "niveau_education": 3,
                  "domaine_etude": "infra_et_cloud",
                  "frequence_deplacement": "frequent",
                  "nombre_d_annees_depuis_la_derniere_promotion": 2
                }
              ]
            }'

      # ✅ vérifie écriture en base
      - name: Verify DB write (api_logs)
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client

          PGPASSWORD=$POSTGRES_PASSWORD psql \
            -h localhost -U postgres -d viken_projet5_ml_db \
            -c "SELECT COUNT(*) FROM api_logs;"

      - name: Show API logs if failure
        if: failure()
        run: docker logs api
