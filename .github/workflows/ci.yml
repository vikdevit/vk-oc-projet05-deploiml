name: CI

on:
  push:
    branches:
      - dev
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Test123!
          POSTGRES_DB: viken_projet5_ml_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Test123!
      POSTGRES_DB: viken_projet5_ml_db
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      JWT_SECRET: dev_super_secret_key_super_long_secret_key_32_chars_minimum_12345

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t ml-api .

      - name: Run API container
        run: |
          docker run -d -p 8000:8000 --name api \
            -e POSTGRES_USER=$POSTGRES_USER \
            -e POSTGRES_PASSWORD=$POSTGRES_PASSWORD \
            -e POSTGRES_DB=$POSTGRES_DB \
            -e POSTGRES_HOST=$POSTGRES_HOST \
            -e POSTGRES_PORT=$POSTGRES_PORT \
            -e JWT_SECRET=$JWT_SECRET \
            ml-api

      - name: Wait API startup
        run: |
          for i in {1..20}; do
            curl -s http://localhost:8000/health && break
            echo "waiting API..."
            sleep 3
          done

      - name: Run API test (write in DB)
        run: |
          curl -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{
              "employees": [{
                "age": 34,
                "genre": "m",
                "revenu_mensuel": 3200,
                "statut_marital": "celibataire",
                "departement": "commercial"
              }]
            }'

      - name: Verify DB write (api_logs)
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client

          PGPASSWORD=$POSTGRES_PASSWORD psql \
            -h localhost -U postgres -d viken_projet5_ml_db \
            -c "SELECT COUNT(*) FROM api_logs;"

      - name: Show API logs if failure
        if: failure()
        run: docker logs api
